<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Simple Web Page</title>
    <style>
        /* Basic styling to create a design */
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background: #333;
            color: #fff;
            padding: 1rem;
            text-align: center;
        }
        main {
            padding: 20px;
            max-width: 800px;
            margin: auto;
            background: #fff;
        }
        footer {
            text-align: center;
            padding: 10px;
            background: #333;
            color: #fff;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to My Website</h1>
    </header>

    <main>
        <h2>About This Page</h2>
        <p>This is a simple web page designed using <strong>HTML</strong> and <strong>CSS</strong>. It includes a header, a main content area, and a footer.</p>
        
        <h3>My Interests</h3>
        <ul>
            <li>Web Development</li>
            <li>Graphic Design</li>
            <li>Learning New Things</li>
        </ul>

        <p>You can learn more by visiting <a href="https://www.w3schools.com">W3Schools</a>.</p>
    </main>

    <footer>
        <p>&copy; 2024 My Simple Web Page</p>
    </footer>

</body>
</html>
